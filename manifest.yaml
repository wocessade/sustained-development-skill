# Sustained Development — declarative loading manifest
# Attention retention workflow for long, multi-step development tasks.
# Cross-platform: Linux, macOS, Windows (Git Bash / WSL).

name: sustained-development
version: "1.0"
description: Attention retention workflow for long development tasks — 6-layer defense against context decay, task boundary drift, and verification slack.

# ── Session Variables ──────────────────────────────
session_variables:
  smtp_server:
    description: "SMTP server hostname for optional completion notification. If unset, email step is skipped."
    default: null
  smtp_port:
    description: "SMTP server port."
    default: "587"
  smtp_user:
    description: "SMTP username for authentication."
    default: null
  smtp_pass:
    description: "SMTP password or app-specific token."
    default: null
  notify_email:
    description: "Recipient email address for completion notification."
    default: null

# ── Axes (Auto-Trigger Detection) ──────────────────
axes:
  trigger:
    description: "Whether this task warrants the sustained-development workflow"
    values: [manual, auto]
    detect:
      auto: "User describes a complex feature, multi-file change, refactoring, data pipeline, or multi-step implementation; mentions 'multiple files', 'several steps', 'do it carefully', '仔细点'; describes work involving 4+ files or 2+ subtasks; OR user just approved a plan (via EnterPlanMode) and says 'start implementing', 'execute', 'let's build', 'let's do it', 'begin work', '开始实施', '按计划做', '动手吧', '可以做了', '开始做'"
      manual: "User says '/sustained' or '长任务' (explicit invocation)"

  taskScope:
    description: "Estimated scope for checkpoint interval calculation"
    values: [small, medium, large]
    detect:
      small: "Task is described as 'quick change', 'fix', 'tweak', or involves 1-2 files"
      medium: "Task involves 3-8 files or multiple steps but within a single component"
      large: "Task involves 9+ files, cross-component changes, new feature from scratch, or pipeline/data architecture work"

# ── Always Load ─────────────────────────────────────
always_load:
  - SKILL.md

# ── On Demand: Sub-agent Prompts ──────────────────
prompts:
  implementer:
    file: implementer-prompt.md
    description: Sub-agent prompt template with forced escalation return format
  sentry:
    file: sentry-prompt.md
    description: Audit agent prompt with 4 review dimensions

# ── References ─────────────────────────────────────
references:
  test-scenario:
    file: test-scenario.md
    condition:
      stage: [test]
    on_demand: true
